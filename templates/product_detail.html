<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>product details</title>
</head>
<body>
    <h1>{{ product["name"] }}</h1>
    <p>Description: {{ product["description"] }}</p>
    <p>price: £{{ product["price"] }}</p>
    <p>stock: {{ product["stock"] }}</p>

    <a href="{{url_for('add_to_basket', id=product['productID']) }}">add to basket</a>


</body>
</html>
